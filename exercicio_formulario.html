<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício HTML</title>
</head>
<body>
    <h1>Formulário de Cadastro</h1>
    <form action="">
        <label for="name">Nome</label>
        <input id="name" type="text" placeholder="Insira seu nome completo"/>
        <br />
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="Insira seu e-mail"/>
        <br />
        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="Insira sua senha"/>
        <br>
        <button type="submit">Cadastrar</button>
        <button type="reset">Limpar</button>
        
    </form>
</body>
</html>
